# Retain admin (embedded Shopify app) — Railway config-as-code
#
# In Railway service settings:
#   Root directory: /   (repo root — required)
#   Config file:    /apps/admin/railway.toml
#   Builder:        Dockerfile (do NOT use Railpack/Nixpacks)
#
# Build-time variables (set on this service before deploy):
#   VITE_API_URL=https://retainapi-production.up.railway.app
#   VITE_API_PUBLIC_URL=https://retainapi-production.up.railway.app
#   VITE_SHOPIFY_API_KEY=<client-id>
#   VITE_SHOPIFY_APP_URL=https://retainadmin-production.up.railway.app

# Force Dockerfile builds — Railpack/Nixpacks incorrectly runs `vite` and
# serves unbuilt source (/%VITE_SHOPIFY_API_KEY%, /@vite/client), which breaks
# the embedded app with "Session required / Failed to fetch".
[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/admin/Dockerfile"
watchPatterns = [
  "apps/admin/**",
  "packages/shared/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
]

[deploy]
# Must match Dockerfile CMD. Never use `pnpm …` / `vite` in Railway UI Start Command.
# If Config file is not loaded, set Custom Start Command to: node server.mjs
startCommand = "node server.mjs"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
