# Retain API — Railway config-as-code
#
# In Railway service settings:
#   Root directory: / (repo root — required for turbo prune Docker build)
#   Config file:    /apps/api/railway.toml
#
# Generate a public domain, then set SHOPIFY_APP_URL to that HTTPS URL.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
# Do NOT set buildCommand here — it runs `pnpm` outside the image and fails with
# "The executable `pnpm` could not be found" when Railway skips Dockerfile.
watchPatterns = [
  "apps/api/**",
  "packages/database/**",
  "packages/shared/**",
  "packages/shopify-admin/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
]

[deploy]
# Must match Dockerfile CMD. Never use `pnpm …` — the runner image has no pnpm.
# If railway.toml is not loaded, set this same command in Railway → Settings → Deploy.
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
