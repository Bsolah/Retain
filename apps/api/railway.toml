# Retain API — Railway config-as-code
#
# In Railway service settings:
#   Root directory: / (repo root — required for turbo prune Docker build)
#   Config file:    /apps/api/railway.toml
#
# Generate a public domain, then set SHOPIFY_APP_URL to that HTTPS URL.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
# Fallback when Railway uses Railpack instead of Dockerfile (must build workspace deps first)
buildCommand = "pnpm run build:railway:api"
watchPatterns = [
  "apps/api/**",
  "packages/database/**",
  "packages/shared/**",
  "packages/shopify-admin/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
]

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
