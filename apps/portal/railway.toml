# Retain customer portal — Railway config-as-code
#
# In Railway service settings:
#   Root directory: /
#   Config file:    /apps/portal/railway.toml
#   Builder:        Dockerfile
#
# Build-time variables: VITE_API_URL, VITE_PORTAL_URL

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/portal/Dockerfile"
watchPatterns = [
  "apps/portal/**",
  "packages/shared/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
]

[deploy]
startCommand = "/docker-entrypoint.sh nginx -g 'daemon off;'"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
