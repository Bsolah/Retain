# Retain AI service — Railway config-as-code
#
# In Railway service settings:
#   Root directory: apps/ai
#   Config file:    /apps/ai/railway.toml
#
# Point API AI_SERVICE_URL at this service's public or private URL.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
