# Retain webhook worker — Railway config-as-code
#
# In Railway service settings:
#   Root directory: /
#   Config file:    /apps/webhook-worker/railway.toml
#
# ENCRYPTION_KEY and SHOPIFY_API_SECRET must match the API service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/webhook-worker/Dockerfile"
# Do NOT set buildCommand — avoids `pnpm` outside the Docker image.
watchPatterns = [
  "apps/webhook-worker/**",
  "packages/database/**",
  "packages/shared/**",
  "packages/shopify-admin/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
]

[deploy]
# Runner has node only — never `pnpm …`. Mirror in Railway UI if config is not loaded.
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
