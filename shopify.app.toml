# Retain Shopify app — deploy extensions with: shopify app deploy
# OAuth + API are served from apps/api; this file configures the Partner app + theme extension.
#
# application_url = embedded admin (Partner Dashboard App URL)
# Webhook URIs target the API origin (SHOPIFY_APP_URL in apps/api/.env)
#
# Before first extension deploy:
#   shopify auth login
#   pnpm shopify:deploy

client_id = "c2b06159f0e16307984e9fd00001740e"
name = "Retain"
application_url = "https://steering-overseas-lemon-intended.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/shop/redact"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/app_subscriptions/update"

  [[webhooks.subscriptions]]
  topics = [ "bulk_operations/finish" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/bulk_operations/finish"

  [[webhooks.subscriptions]]
  topics = [ "customers/create" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/customers/create"

  [[webhooks.subscriptions]]
  topics = [ "customers/update" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/customers/update"

  [[webhooks.subscriptions]]
  topics = [ "customers/delete" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/customers/delete"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/updated" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/orders/updated"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/orders/paid"

  [[webhooks.subscriptions]]
  topics = [ "orders/cancelled" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/orders/cancelled"

  [[webhooks.subscriptions]]
  topics = [ "subscription_contracts/create" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/subscription_contracts/create"

  [[webhooks.subscriptions]]
  topics = [ "subscription_contracts/update" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/subscription_contracts/update"

  [[webhooks.subscriptions]]
  topics = [ "subscription_billing_attempts/success" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/subscription_billing_attempts/success"

  [[webhooks.subscriptions]]
  topics = [ "subscription_billing_attempts/failure" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/subscription_billing_attempts/failure"

  [[webhooks.subscriptions]]
  topics = [ "subscription_billing_attempts/challenged" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/subscription_billing_attempts/challenged"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "https://literature-turtle-mouse-earl.trycloudflare.com/webhooks/shopify/products/update"

[access_scopes]
scopes = "read_products,write_products,read_customers,read_orders,read_customer_payment_methods,read_own_subscription_contracts,write_own_subscription_contracts,read_themes"

[auth]
redirect_urls = [
  "https://literature-turtle-mouse-earl.trycloudflare.com/auth/callback"
]
