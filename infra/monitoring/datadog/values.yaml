# Datadog Agent — ECS Fargate sidecar or EKS DaemonSet

datadog:
  apiKeyExistingSecret: datadog-secret
  site: datadoghq.com
  logs:
    enabled: true
    containerCollectAll: true
  apm:
    portEnabled: true
    instrumentation:
      enabled: true
      libVersions:
        js: "5"
        python: "2"
  processAgent:
    enabled: true
  kubeStateMetricsEnabled: true

clusterAgent:
  enabled: true
  metricsProvider:
    enabled: true

agents:
  tolerations: []
  resources:
    requests:
      cpu: 200m
      memory: 256Mi

