apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retain-worker.fullname" . }}
  labels:
    app.kubernetes.io/name: retain-webhook-worker
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: retain-webhook-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retain-webhook-worker
    spec:
      containers:
        - name: webhook-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            {{- range .Values.secretRefs }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
