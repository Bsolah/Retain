apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "retain-api.fullname" . }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "retain-api.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
