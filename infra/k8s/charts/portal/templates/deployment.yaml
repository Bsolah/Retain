apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retain-portal.fullname" . }}
  labels:
    app.kubernetes.io/name: retain-portal
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: retain-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retain-portal
    spec:
      containers:
        - name: portal
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
