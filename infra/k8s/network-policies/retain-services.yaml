# Cross-service egress: API and worker may reach Postgres/Redis via cluster egress (configure separately)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: retain-api-egress
  namespace: retain
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: retain-api
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: retain-ai
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kube-dns
      ports:
        - protocol: UDP
          port: 53
